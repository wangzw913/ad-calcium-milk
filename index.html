<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>AD钙奶 · 酸甜成长记</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:manipulation}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;display:flex;justify-content:center;align-items:center;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
#app{position:relative;width:100%;max-width:430px;height:100vh;height:100dvh;max-height:932px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.3);background:#000}
.scr{position:absolute;inset:0;transition:opacity .45s ease}
.scr.hid{opacity:0;pointer-events:none}

/* ====== START SCREEN ====== */
#start-screen{z-index:50}
#start-screen .bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cover-logo{position:absolute;top:2px;top:max(2px,env(safe-area-inset-top,0));left:10px;z-index:5;pointer-events:none}
.cover-logo img{height:30px;width:auto;filter:drop-shadow(0 2px 6px rgba(0,0,0,.15))}
.start-btn-wrap{position:absolute;bottom:16%;left:0;right:0;text-align:center;z-index:5}
.btn-start{border:1.5px solid rgba(255,255,255,.6);border-radius:24px;font-family:inherit;font-weight:700;cursor:pointer;transition:all .2s;outline:none;-webkit-tap-highlight-color:transparent;padding:10px 28px;font-size:13px;letter-spacing:3px;color:#fff;background:rgba(76,175,80,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);box-shadow:0 4px 16px rgba(0,0,0,.1);animation:btnPulse 2s ease-in-out infinite}
.btn-start:active{transform:scale(.94);background:rgba(76,175,80,.85)}
@keyframes btnPulse{0%,100%{box-shadow:0 4px 16px rgba(76,175,80,.3);transform:translateY(0)}50%{box-shadow:0 8px 28px rgba(76,175,80,.55);transform:translateY(-4px)}}


.start-sparks{position:absolute;inset:0;pointer-events:none;z-index:1}
.start-sparks span{position:absolute;animation:spark 2s ease-in-out infinite}
.start-sparks span:nth-child(1){top:10%;left:12%;font-size:18px;animation-delay:0s}
.start-sparks span:nth-child(2){top:6%;right:16%;font-size:14px;animation-delay:-.5s}
.start-sparks span:nth-child(3){top:26%;left:5%;font-size:15px;animation-delay:-1s}
.start-sparks span:nth-child(4){top:20%;right:7%;font-size:20px;animation-delay:-1.5s}
.start-sparks span:nth-child(5){bottom:32%;left:9%;font-size:16px;animation-delay:-.3s}
.start-sparks span:nth-child(6){bottom:26%;right:13%;font-size:18px;animation-delay:-1.1s}
.start-sparks span:nth-child(7){top:40%;left:50%;font-size:12px;animation-delay:-.7s}
.start-sparks span:nth-child(8){bottom:40%;right:20%;font-size:14px;animation-delay:-1.8s}
@keyframes spark{0%,100%{opacity:.2;transform:scale(.6) rotate(0)}50%{opacity:.8;transform:scale(1.3) rotate(15deg)}}

/* ====== GAME ====== */
#game-screen{z-index:30;background:#000}
#game-canvas{position:absolute;inset:0;display:block;width:100%;height:100%;z-index:1}
.game-logo{position:absolute;top:6px;top:max(6px,env(safe-area-inset-top,0));left:10px;z-index:10;pointer-events:none}
.game-logo img{height:22px;width:auto;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.game-hud{position:absolute;top:6px;top:max(6px,env(safe-area-inset-top,0));left:0;right:0;height:40px;display:flex;align-items:center;justify-content:center;gap:10px;pointer-events:none;z-index:8;padding:0 50px}
.hud-stage{background:rgba(0,0,0,.5);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;color:#fff;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.25);letter-spacing:1px;transition:all .4s;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.hud-score{background:rgba(0,0,0,.5);border-radius:20px;padding:8px 22px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.hud-score .lbl{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:2px}
.hud-score .val{font-size:22px;font-weight:900;color:#fff;line-height:1}
.hud-timer{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.25);font-size:17px;font-weight:900;color:#fff;transition:all .3s;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.hud-timer.urgent{color:#FF5252;background:rgba(255,82,82,.35);border-color:rgba(255,82,82,.4);animation:tb .5s ease-in-out infinite}
@keyframes tb{50%{transform:translateY(-50%) scale(1.12)}}

/* Theme tagline above progress */
.game-theme-tag{position:absolute;bottom:68px;bottom:max(68px,calc(env(safe-area-inset-bottom,8px) + 52px));left:0;right:0;text-align:center;pointer-events:none;z-index:8;font-size:13px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:3px;text-shadow:0 2px 8px rgba(0,0,0,.3);transition:all .5s}

/* Bottom progress bar */
.game-progress{position:absolute;bottom:16px;bottom:max(16px,env(safe-area-inset-bottom,8px));left:12px;right:12px;height:44px;display:flex;align-items:center;gap:0;pointer-events:none;z-index:8;background:rgba(0,0,0,.5);border-radius:24px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2);box-shadow:0 4px 16px rgba(0,0,0,.2);padding:0 8px}
.prog-stage{flex:1;text-align:center;font-size:12px;font-weight:700;color:rgba(255,255,255,.4);padding:8px 0;position:relative;transition:all .5s;letter-spacing:1px}
.prog-stage::after{content:'';position:absolute;bottom:6px;left:50%;right:50%;height:3px;background:rgba(255,255,255,.15);border-radius:2px;transition:all .5s}
.prog-stage.active{color:#fff;text-shadow:0 0 12px rgba(255,255,255,.5);transform:scale(1.05)}
.prog-stage.active::after{left:20%;right:20%;background:#4CAF50;box-shadow:0 0 12px rgba(76,175,80,.7)}
.prog-stage.done{color:rgba(255,255,255,.75)}
.prog-stage.done::after{left:20%;right:20%;background:#A5D6A7}
.prog-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);margin-right:5px;transition:all .5s}
.prog-stage.active .prog-dot{background:#4CAF50;box-shadow:0 0 10px rgba(76,175,80,.9)}
.prog-stage.done .prog-dot{background:#A5D6A7}
.hint-text{position:absolute;bottom:130px;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,.85);pointer-events:none;z-index:6;animation:fh 3.5s ease-in-out forwards;text-shadow:0 2px 6px rgba(0,0,0,.2)}
@keyframes fh{0%{opacity:0;transform:translateY(8px)}20%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0}}
#stage-toast{position:absolute;top:25%;left:50%;transform:translate(-50%,-50%);z-index:8;pointer-events:none;opacity:0;font-size:30px;font-weight:900;color:#fff;text-align:center;text-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .4s;line-height:1.4}
#stage-toast.show{opacity:1}

/* Countdown */
#countdown-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:9;pointer-events:none;background:rgba(255,255,255,.25)}
#countdown-overlay.active{display:flex}
#countdown-num{font-size:80px;font-weight:900;color:#4CAF50;text-shadow:0 4px 18px rgba(76,175,80,.35);animation:cp .5s cubic-bezier(.175,.885,.32,1.275);position:relative;z-index:2}
@keyframes cp{0%{transform:scale(1.6);opacity:0}100%{transform:scale(1);opacity:1}}
.cd-ring{position:absolute;width:100px;height:100px;border-radius:50%;border:3px solid rgba(76,175,80,.5);animation:cdRingPulse .7s ease-out forwards;pointer-events:none}
@keyframes cdRingPulse{0%{transform:scale(.5);opacity:1}100%{transform:scale(2.5);opacity:0}}
.cd-particle{position:absolute;width:6px;height:6px;border-radius:50%;background:#4CAF50;animation:cdParticle .8s ease-out forwards;pointer-events:none}
@keyframes cdParticle{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

/* ====== RESULT ====== */
#result-screen{z-index:40;background:#0d1f0d}
#result-screen .bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.result-dim{display:none}
.result-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:26px 14px 14px;z-index:2}
.result-logo{animation:cardIn .6s cubic-bezier(.175,.885,.32,1.275);margin-bottom:6px}
.result-logo img{height:44px;width:auto;filter:drop-shadow(0 3px 10px rgba(0,0,0,.25))}
.result-all-bottles{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:5px;animation:cardIn .6s cubic-bezier(.175,.885,.32,1.275) .1s both;margin:2px 0 6px;padding:0 4px}
.result-all-bottles img{height:52px;width:auto;filter:drop-shadow(0 3px 8px rgba(0,0,0,.15))}
.result-card{background:rgba(255,255,255,.06);border-radius:22px;padding:16px 20px;box-shadow:0 12px 40px rgba(0,0,0,.2);text-align:center;border:1.5px solid rgba(200,230,201,.3);max-width:300px;width:100%;animation:cardIn .6s cubic-bezier(.175,.885,.32,1.275) .2s both;position:relative;overflow:hidden;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#66BB6A,#A5D6A7,#FFCC80,#F48FB1,#CE93D8)}
.result-title-text{font-size:16px;font-weight:900;color:#4CAF50;margin-bottom:2px}
.result-persona-name{font-size:20px;font-weight:900;color:#FF8A65;margin:3px 0}
.result-persona-desc{font-size:12px;color:#666;line-height:1.6;margin-bottom:4px}
.result-scores-grid{display:flex;justify-content:center;gap:10px;padding:6px 0;border-top:1px solid rgba(0,0,0,.06);border-bottom:1px solid rgba(0,0,0,.06);margin:4px 0}
.result-score-item{text-align:center;min-width:40px}
.result-score-item .s-icon{font-size:18px}
.result-score-item .s-num{font-size:18px;font-weight:900;color:#4CAF50}
.result-score-item .s-lbl{font-size:9px;color:#888;margin-top:1px;line-height:1.3}
.result-total{font-size:32px;font-weight:900;color:#4CAF50;margin:3px 0 0}
.result-total-lbl{font-size:10px;color:#888;letter-spacing:2px}
.result-slogan-text{font-size:13px;color:#5D8A5D;font-weight:700;letter-spacing:2px;margin-top:5px;line-height:1.5}
.result-btns{display:flex;gap:10px;margin-top:8px;padding-bottom:env(safe-area-inset-bottom,12px);animation:cardIn .6s cubic-bezier(.175,.885,.32,1.275) .3s both}
.btn-replay{border:none;border-radius:24px;font-family:inherit;font-weight:700;cursor:pointer;transition:all .15s;outline:none;-webkit-tap-highlight-color:transparent;padding:10px 20px;font-size:13px;color:#fff;background:rgba(76,175,80,.8);box-shadow:0 4px 14px rgba(0,0,0,.12);backdrop-filter:blur(4px)}
.btn-replay:active{transform:scale(.95)}
.btn-share{border:none;border-radius:24px;font-family:inherit;font-weight:700;cursor:pointer;transition:all .15s;outline:none;-webkit-tap-highlight-color:transparent;padding:10px 20px;font-size:13px;color:#fff;background:rgba(255,138,101,.85);box-shadow:0 6px 20px rgba(255,138,101,.3);backdrop-filter:blur(4px)}
.btn-share:active{transform:scale(.95)}
@keyframes cardIn{0%{transform:translateY(18px);opacity:0}100%{transform:translateY(0);opacity:1}}

#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:#fff;padding:14px 28px;border-radius:12px;font-size:15px;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s}
#toast.show{opacity:1}
</style>
</head>
<body>

<div id="app">

<!-- START SCREEN -->
<div class="scr" id="start-screen">
  <img class="bg-img" src="assets/开始页.png" alt="">
  <div class="cover-logo"><img src="assets/娃哈哈LOGO-1.png" alt="娃哈哈"></div>
  <div class="start-sparks"><span>✨</span><span>💚</span><span>🌸</span><span>💫</span><span>🌟</span><span>🧃</span><span>✨</span><span>💚</span></div>
  <div class="start-btn-wrap"><button class="btn-start" onclick="clickStart()">开 始 游 戏</button></div>
</div>

<!-- GAME SCREEN -->
<div class="scr hid" id="game-screen">
  <canvas id="game-canvas"></canvas>
  <div class="game-logo"><img src="assets/娃哈哈LOGO-1.png" alt="娃哈哈"></div>
  <div class="game-hud">
    <div class="hud-stage" id="hudStage">🌟 童年</div>
    <div class="hud-score"><div class="lbl">酸甜值</div><div class="val" id="hudScore">0</div></div>
    <div class="hud-timer" id="hudTimer">30</div>
  </div>
  <div id="stage-toast"></div>
  <div class="game-theme-tag" id="themeTag">陪你酸酸甜甜  懂你可可爱爱</div>
  <div class="game-progress" id="gameProgress">
    <div class="prog-stage active" id="prog0"><span class="prog-dot"></span>童年</div>
    <div class="prog-stage" id="prog1"><span class="prog-dot"></span>青春</div>
    <div class="prog-stage" id="prog2"><span class="prog-dot"></span>现在</div>
  </div>
  <div id="countdown-overlay"><div id="countdown-num">3</div></div>
</div>

<!-- RESULT SCREEN -->
<div class="scr hid" id="result-screen">
  <img class="bg-img" src="assets/结束页.png" alt="">
  <div class="result-dim"></div>
  <div class="result-overlay">
    <div class="result-logo"><img src="assets/娃哈哈LOGO-1.png" alt="娃哈哈"></div>
    <div class="result-all-bottles">
      <img src="assets/220AD草莓味新瓶型.png" alt="">
      <img src="assets/220AD蜜桃味新瓶型.png" alt="">
      <img src="assets/220新AD.png" alt="">
      <img src="assets/450新AD乳酸菌.png" alt="">
      <img src="assets/450新AD胶原蛋白.png" alt="">
      <img src="assets/220AD草莓味AD瓶型.png" alt="">
      <img src="assets/220AD蜜桃味AD瓶型.png" alt="">
      <img src="assets/450新AD.png" alt="">
      <img src="assets/450草莓味.png" alt="">
      <img src="assets/450水蜜桃味.png" alt="">
    </div>
    <div class="result-card">
      <div class="result-title-text" id="resultTitle">🌟 超棒的！</div>
      <div class="result-persona-name" id="personaName">「酸甜达人」</div>
      <div class="result-persona-desc" id="personaDesc"></div>
      <div class="result-scores-grid">
        <div class="result-score-item"><div class="s-icon">🍓</div><div class="s-num" id="scStraw">0</div><div class="s-lbl">草莓<br>+12</div></div>
        <div class="result-score-item"><div class="s-icon">🍑</div><div class="s-num" id="scPeach">0</div><div class="s-lbl">蜜桃<br>+10</div></div>
        <div class="result-score-item"><div class="s-icon">🥛</div><div class="s-num" id="scClassic">0</div><div class="s-lbl">经典<br>+8</div></div>
        <div class="result-score-item"><div class="s-icon">🥤</div><div class="s-num" id="scOther">0</div><div class="s-lbl">其他<br>+5~20</div></div>
      </div>
      <div class="result-total" id="statTotal">0</div>
      <div class="result-total-lbl">⭐ 酸甜总值</div>
      <div class="result-slogan-text">陪你酸酸甜甜 · 懂你可可爱爱</div>
    </div>
    <div class="result-btns">
      <button class="btn-replay" onclick="replayGame()">再来一次</button>
      <button class="btn-share" onclick="shareResult()">分享好友</button>
    </div>
  </div>
</div>

</div>

<div id="toast"></div>

<script>
// ============ POLYFILL ============
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y)}}

// ============ AUDIO ============
var actx=null;
function ia(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume()}
function pb(f,d,t,v){if(!actx)return;v=v||.08;t=t||'sine';var T=actx.currentTime;var o=actx.createOscillator();var g=actx.createGain();o.type=t;o.frequency.setValueAtTime(f,T);g.gain.setValueAtTime(v,T);g.gain.exponentialRampToValueAtTime(.001,T+d);o.connect(g);g.connect(actx.destination);o.start(T);o.stop(T+d)}
function sfxCatch(){pb(880,.1,'sine',.1);setTimeout(function(){pb(1100,.12,'sine',.08)},60)}
function sfxCountdown(){pb(660,.15,'triangle',.1)}
function sfxGo(){pb(1047,.25,'square',.12)}
function sfxEnd(){pb(523,.2,'triangle',.1);setTimeout(function(){pb(659,.2,'triangle',.1)},150);setTimeout(function(){pb(784,.35,'triangle',.12)},300)}
function sfxStageChange(){pb(784,.2,'sine',.07);setTimeout(function(){pb(988,.25,'sine',.08)},100)}

// ============ BACKGROUND MUSIC ============
var bgmTimer=null,bgmGain=null,bgmRunning=false;
// Cheerful melody in C major - "酸甜成长" theme
var melody=[
  {n:523,d:0.25},{n:587,d:0.25},{n:659,d:0.25},{n:784,d:0.35},{n:0,d:0.1},
  {n:784,d:0.2},{n:659,d:0.2},{n:587,d:0.2},{n:523,d:0.4},{n:0,d:0.15},
  {n:587,d:0.2},{n:659,d:0.2},{n:784,d:0.25},{n:880,d:0.2},{n:784,d:0.25},{n:659,d:0.3},{n:0,d:0.1},
  {n:587,d:0.2},{n:523,d:0.25},{n:440,d:0.25},{n:523,d:0.4},{n:0,d:0.15},
  {n:659,d:0.2},{n:784,d:0.2},{n:880,d:0.3},{n:784,d:0.25},{n:659,d:0.2},{n:587,d:0.3},{n:0,d:0.1},
  {n:523,d:0.25},{n:587,d:0.2},{n:659,d:0.25},{n:523,d:0.5},{n:0,d:0.3}
];
var melodyTotal=melody.reduce(function(s,n){return s+n.d},0);

function playMelodyNote(idx){
  if(!bgmRunning||!actx)return;
  var note=melody[idx];
  if(note.n>0){
    var t=actx.currentTime;
    var o=actx.createOscillator();var g=actx.createGain();
    o.type='triangle';o.frequency.setValueAtTime(note.n,t);
    g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+note.d*0.9);
    o.connect(g);g.connect(bgmGain||actx.destination);
    o.start(t);o.stop(t+note.d);
  }
  var nextIdx=(idx+1)%melody.length;
  bgmTimer=setTimeout(function(){playMelodyNote(nextIdx)},note.d*1000*0.95);
}

function startBGM(){
  if(bgmRunning)return;
  if(!actx)ia();
  bgmRunning=true;
  if(!bgmGain){bgmGain=actx.createGain();bgmGain.gain.setValueAtTime(0.18,actx.currentTime);bgmGain.connect(actx.destination)}
  playMelodyNote(0);
}
function stopBGM(){
  bgmRunning=false;
  if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null}
}

// ============ DOM ============
var startScreen=document.getElementById('start-screen');
var gameScreen=document.getElementById('game-screen');
var gameCanvas=document.getElementById('game-canvas');
var gctx=gameCanvas.getContext('2d');
var resultScreen=document.getElementById('result-screen');
function showScr(scr){[startScreen,gameScreen,resultScreen].forEach(function(s){s.classList.toggle('hid',s!==scr)})}

// ============ ASSETS ============
var IMG={};
var AP={
  strawNew:'assets/220AD草莓味新瓶型.png',peachNew:'assets/220AD蜜桃味新瓶型.png',classic:'assets/220新AD.png',
  lactic:'assets/450新AD乳酸菌.png',collagen:'assets/450新AD胶原蛋白.png',
  strawBig:'assets/220AD草莓味AD瓶型.png',peachBig:'assets/220AD蜜桃味AD瓶型.png',
  main450:'assets/450新AD.png',straw450:'assets/450草莓味.png',peach450:'assets/450水蜜桃味.png',
  bg1:'assets/游戏背景1.png',bg2:'assets/游戏背景2.png',bg3:'assets/游戏背景3.png',
  char1:'assets/人物图1.png',char2:'assets/人物图2.png',char3:'assets/人物图3.png'
};
function loadAll(){var keys=Object.keys(AP);return Promise.all(keys.map(function(k){return new Promise(function(rs){var img=new Image();img.onload=function(){IMG[k]=img;rs()};img.onerror=function(){rs()};img.src=AP[k]})}))}

// ============ GAME ============
var GW=430,GAME_DUR=30,gW=430,gH=800,dprG=Math.min(window.devicePixelRatio||1,2);
function resizeGC(){var r=gameScreen.getBoundingClientRect();if(r.width<10)return;gameCanvas.width=Math.floor(r.width*dprG);gameCanvas.height=Math.floor(r.height*dprG);gctx.setTransform(1,0,0,1,0,0);gctx.scale(dprG,dprG);gW=r.width;gH=r.height}
window.addEventListener('resize',function(){if(gameRunning)resizeGC()});
function drawCloud(cx,x,y,s,o){o=o||.85;cx.fillStyle='rgba(255,255,255,'+o+')';cx.beginPath();cx.arc(x,y,s*.5,0,Math.PI*2);cx.arc(x+s*.35,y-s*.15,s*.4,0,Math.PI*2);cx.arc(x+s*.65,y+s*.05,s*.35,0,Math.PI*2);cx.arc(x-s*.2,y+s*.05,s*.3,0,Math.PI*2);cx.fill()}

// ============ CHARACTER - uses user-supplied images ============
function drawCharacter(cx,x,y,scale,stage){
  var charImg=[IMG.char1,IMG.char2,IMG.char3][stage];
  if(!charImg)return;
  var w=charImg.width*scale*0.25;
  var h=charImg.height*scale*0.25;
  cx.save();cx.translate(x,y);
  // Shadow at feet
  cx.fillStyle='rgba(0,0,0,.1)';cx.beginPath();cx.ellipse(0,h*0.05,w*.4,h*.03,0,0,Math.PI*2);cx.fill();
  cx.drawImage(charImg,-w/2,-h*0.95,w,h);
  cx.restore();
}

// ============ GAME STATE ============
var gameRunning=false,score=0,timeLeft=GAME_DUR;
var countStraw=0,countPeach=0,countClassic=0,countOther=0;
var playerX=GW/2,targetX=GW/2,items=[],particles=[],floatTexts=[];
var gameLoopId=null,spawnTimer=0,lastTime=0,currentStage=0,stageTransTime=0,bgClouds=[];

function initBgClouds(){bgClouds=[];for(var i=0;i<6;i++)bgClouds.push({x:Math.random()*gW,y:15+Math.random()*gH*.3,s:20+Math.random()*50,spd:.1+Math.random()*.3,op:.5+Math.random()*.35})}

function spawnItem(){
  var types=[
    {type:'strawNew',w:12,score:12,img:'strawNew',cat:'straw'},{type:'peachNew',w:10,score:10,img:'peachNew',cat:'peach'},
    {type:'classic',w:12,score:8,img:'classic',cat:'classic'},{type:'lactic',w:9,score:14,img:'lactic',cat:'other'},
    {type:'collagen',w:7,score:16,img:'collagen',cat:'other'},{type:'strawBig',w:7,score:11,img:'strawBig',cat:'straw'},
    {type:'peachBig',w:6,score:9,img:'peachBig',cat:'peach'},{type:'main450',w:8,score:10,img:'main450',cat:'classic'},
    {type:'straw450',w:6,score:13,img:'straw450',cat:'straw'},{type:'peach450',w:5,score:11,img:'peach450',cat:'peach'},
    {type:'lemon',w:5,score:5,img:null,cat:'other'},{type:'heart',w:3,score:20,img:null,cat:'other'}
  ];
  var tw=0;for(var i=0;i<types.length;i++)tw+=types[i].w;
  var r=Math.random()*tw,ch=types[0];
  for(var i=0;i<types.length;i++){r-=types[i].w;if(r<=0){ch=types[i];break}}
  items.push({type:ch.type,x:30+Math.random()*(gW-60),y:-80,spd:1.1+Math.random()*1.98,wobble:Math.random()*Math.PI*2,wSpd:.015+Math.random()*.035,wAmp:10+Math.random()*25,score:ch.score,img:ch.img,cat:ch.cat,scale:.45+Math.random()*.35,rot:(Math.random()-.5)*.5});
}
function burstP(x,y,color){for(var i=0;i<12;i++){var a=Math.PI*2*i/12+Math.random()*.2,spd=2+Math.random()*4;particles.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,life:1,decay:.018+Math.random()*.03,color:color,size:2+Math.random()*5})}}
function addFT(x,y,text,color){floatTexts.push({x:x,y:y,text:text,color:color,life:1,decay:.014})}
function getEP(e){if(e.touches&&e.touches.length>0)return{x:e.touches[0].clientX,y:e.touches[0].clientY};if(e.changedTouches&&e.changedTouches.length>0)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};return{x:e.clientX,y:e.clientY}}
function getCP(cx,cy){var r=gameCanvas.getBoundingClientRect();return{x:cx-r.left,y:cy-r.top}}

function updateStage(){
  var el=GAME_DUR-timeLeft,ns;if(el<10)ns=0;else if(el<20)ns=1;else ns=2;
  if(ns!==currentStage){currentStage=ns;stageTransTime=1.5;sfxStageChange();document.getElementById('hudStage').textContent=['🌟 童年','📚 青春','✨ 现在'][currentStage];var t=document.getElementById('stage-toast');t.innerHTML=['陪你酸酸甜甜','懂你可可爱爱','酸甜成长记'][currentStage];t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1600);
    document.getElementById('themeTag').textContent=['陪你酸酸甜甜  ·  AD钙奶一路相伴','懂你可可爱爱  ·  酸甜滋味青春正好','陪你酸酸甜甜  懂你可可爱爱'][currentStage];
    for(var p=0;p<3;p++){var el=document.getElementById('prog'+p);el.classList.remove('active','done');if(p<currentStage)el.classList.add('done');if(p===currentStage)el.classList.add('active')}
  }
}

function gameLoop(ts){if(!gameRunning)return;if(!lastTime)lastTime=ts;var dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;update(dt);render();gameLoopId=requestAnimationFrame(gameLoop)}

function update(dt){
  timeLeft-=dt*.01667;if(timeLeft<=0){timeLeft=0;endGame();return}
  document.getElementById('hudTimer').textContent=Math.ceil(timeLeft);document.getElementById('hudTimer').classList.toggle('urgent',timeLeft<=10);
  updateStage();if(stageTransTime>0)stageTransTime-=dt*.01667;
  playerX+=(targetX-playerX)*.14*dt;playerX=Math.max(22,Math.min(gW-22,playerX));
  for(var i=0;i<bgClouds.length;i++){bgClouds[i].x+=bgClouds[i].spd*dt;if(bgClouds[i].x>gW+60)bgClouds[i].x=-60}
  spawnTimer+=dt;var si=38-(GAME_DUR-timeLeft)*.55;if(spawnTimer>Math.max(si,16)){spawnTimer=0;spawnItem()}
  var gnd=gH*.78;
  for(var i=items.length-1;i>=0;i--){
    var it=items[i];it.y+=it.spd*dt;it.wobble+=it.wSpd*dt;var ix=it.x+Math.sin(it.wobble)*it.wAmp,iy=it.y;
    if(iy>gnd-60&&iy<gnd+90&&Math.abs(ix-playerX)<120){
      score+=it.score;if(it.cat==='straw')countStraw++;else if(it.cat==='peach')countPeach++;else if(it.cat==='classic')countClassic++;else countOther++;
      document.getElementById('hudScore').textContent=score;sfxCatch();
      var cols={strawNew:'#F48FB1',peachNew:'#FFCC80',classic:'#66BB6A',lactic:'#80DEEA',collagen:'#F8BBD0',strawBig:'#E91E63',peachBig:'#FF9800',main450:'#81C784',straw450:'#F06292',peach450:'#FFB74D',lemon:'#FFD54F',heart:'#FF8A80'};
      burstP(ix,iy,cols[it.type]||'#fff');addFT(ix,iy-8,(cols[it.type]?'+'+it.score+' ':'')+({strawNew:'🍓',peachNew:'🍑',classic:'🥛',lactic:'🥤',collagen:'🧴',strawBig:'🍓',peachBig:'🍑',main450:'🥛',straw450:'🍓',peach450:'🍑',lemon:'🍋',heart:'💗'}[it.type]||''),cols[it.type]||'#fff');
      var se=document.getElementById('hudScore');se.style.transform='scale(1.25)';setTimeout(function(){se.style.transform='scale(1)'},120);
      items.splice(i,1);
    }else if(it.y>gH+80){items.splice(i,1)}
  }
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.06*dt;p.life-=p.decay*dt;if(p.life<=0)particles.splice(i,1)}
  for(var i=floatTexts.length-1;i>=0;i--){var ft=floatTexts[i];ft.y-=1*dt;ft.life-=ft.decay*dt;if(ft.life<=0)floatTexts.splice(i,1)}
}

function render(){
  gctx.clearRect(0,0,gW,gH);
  var bgImg=[IMG.bg1,IMG.bg2,IMG.bg3][currentStage];
  if(bgImg){gctx.drawImage(bgImg,0,0,gW,gH)}else{var fb=gctx.createLinearGradient(0,0,0,gH);fb.addColorStop(0,'#87CEEB');fb.addColorStop(.4,'#E8F5E9');fb.addColorStop(.78,'#81C784');fb.addColorStop(1,'#388E3C');gctx.fillStyle=fb;gctx.fillRect(0,0,gW,gH)}
  var gnd=gH*.78;
  for(var i=0;i<bgClouds.length;i++)drawCloud(gctx,bgClouds[i].x,bgClouds[i].y,bgClouds[i].s,bgClouds[i].op);
  for(var i=0;i<items.length;i++){
    var it=items[i],ix=it.x+Math.sin(it.wobble)*it.wAmp;
    if(it.img&&IMG[it.img]){var natW=IMG[it.img].width,natH=IMG[it.img].height;var ih=it.scale*150,iw=ih*(natW/natH);gctx.save();gctx.translate(ix,it.y);gctx.rotate(it.rot);gctx.drawImage(IMG[it.img],-iw/2,-ih/2,iw,ih);gctx.restore()}
    else if(it.type==='heart'){gctx.save();gctx.translate(ix,it.y);gctx.rotate(it.rot);gctx.fillStyle='#FF8A80';gctx.beginPath();gctx.moveTo(0,7*it.scale);gctx.bezierCurveTo(-12*it.scale,-2*it.scale,-12*it.scale,-15*it.scale,0,-10*it.scale);gctx.bezierCurveTo(12*it.scale,-15*it.scale,12*it.scale,-2*it.scale,0,7*it.scale);gctx.fill();gctx.restore()}
    else if(it.type==='lemon'){gctx.save();gctx.translate(ix,it.y);gctx.rotate(it.rot);var g=gctx.createLinearGradient(0,-14,0,14);g.addColorStop(0,'#FFF176');g.addColorStop(1,'#FFD54F');gctx.fillStyle=g;gctx.beginPath();gctx.ellipse(0,4,13*it.scale,16*it.scale,0,0,Math.PI*2);gctx.fill();gctx.fillStyle='#8BC34A';gctx.beginPath();gctx.ellipse(0,-12,3,4.5,0,0,Math.PI*2);gctx.fill();gctx.restore()}
  }
  for(var i=0;i<particles.length;i++){var p=particles[i];gctx.globalAlpha=p.life;gctx.fillStyle=p.color;gctx.beginPath();gctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);gctx.fill()}
  gctx.globalAlpha=1;
  for(var i=0;i<floatTexts.length;i++){var ft=floatTexts[i];gctx.globalAlpha=ft.life;gctx.fillStyle=ft.color;gctx.font='bold 13px "Noto Sans SC",sans-serif';gctx.textAlign='center';gctx.fillText(ft.text,ft.x,ft.y)}
  gctx.globalAlpha=1;

  // Character - STARTING SIZE BIGGER
  var elapsed=GAME_DUR-timeLeft,stageProg=(elapsed%10)/10;
  var charScale=0.25+currentStage*.05+stageProg*.03;
  drawCharacter(gctx,playerX,gnd+40,charScale,currentStage);

  var gl=gctx.createRadialGradient(playerX,gnd+40,4,playerX,gnd+40,42);gl.addColorStop(0,'rgba(255,235,59,.2)');gl.addColorStop(1,'rgba(255,235,59,0)');gctx.fillStyle=gl;gctx.beginPath();gctx.arc(playerX,gnd+40,42,0,Math.PI*2);gctx.fill();
  if(stageTransTime>0){gctx.fillStyle='rgba(255,255,255,'+(stageTransTime*.3)+')';gctx.fillRect(0,0,gW,gH)}
}

// ============ COUNTDOWN WITH EFFECTS ============
function spawnCdParticles(){
  var overlay=document.getElementById('countdown-overlay');
  for(var i=0;i<12;i++){
    var p=document.createElement('div');p.className='cd-particle';
    var ang=Math.PI*2*i/12,dist=40+Math.random()*60;
    p.style.setProperty('--dx',Math.cos(ang)*dist+'px');p.style.setProperty('--dy',Math.sin(ang)*dist+'px');
    p.style.left='50%';p.style.top='50%';p.style.background=['#4CAF50','#A5D6A7','#FFEB3B','#FF8A65','#fff'][Math.floor(Math.random()*5)];
    overlay.appendChild(p);
    setTimeout(function(){p.remove()},800);
  }
  // Ring
  var ring=document.createElement('div');ring.className='cd-ring';ring.style.left='50%';ring.style.top='50%';ring.style.transform='translate(-50%,-50%)';
  overlay.appendChild(ring);setTimeout(function(){ring.remove()},700);
}

function startCountdown(){
  gameRunning=false;
  var cdO=document.getElementById('countdown-overlay'),cdN=document.getElementById('countdown-num');
  cdO.classList.add('active');var count=3;
  cdN.textContent=count;cdN.style.cssText='animation:none;color:#4CAF50';void cdN.offsetWidth;cdN.style.animation='cp .5s cubic-bezier(.175,.885,.32,1.275)';sfxCountdown();spawnCdParticles();
  var ci=setInterval(function(){
    count--;
    if(count>0){cdN.textContent=count;cdN.style.cssText='animation:none;color:#4CAF50';void cdN.offsetWidth;cdN.style.animation='cp .5s cubic-bezier(.175,.885,.32,1.275)';sfxCountdown();spawnCdParticles()}
    else{cdN.textContent='GO!';cdN.style.cssText='animation:none;color:#FF7043';void cdN.offsetWidth;cdN.style.animation='cp .5s cubic-bezier(.175,.885,.32,1.275)';sfxGo();spawnCdParticles();spawnCdParticles();
      setTimeout(function(){cdO.classList.remove('active');gameRunning=true;lastTime=0;gameLoopId=requestAnimationFrame(gameLoop);startBGM();
        var h=document.createElement('div');h.className='hint-text';h.textContent='👆 拖动小人接住掉落的酸甜记忆';gameScreen.appendChild(h);
      },400);clearInterval(ci);}
  },700);
}

// ============ START / END ============
function clickStart(){
  ia();showScr(gameScreen);resizeGC();
  score=0;countStraw=0;countPeach=0;countClassic=0;countOther=0;timeLeft=GAME_DUR;
  currentStage=0;stageTransTime=0;playerX=gW/2;targetX=playerX;items=[];particles=[];floatTexts=[];spawnTimer=0;lastTime=0;
  document.getElementById('hudScore').textContent='0';document.getElementById('hudTimer').textContent=GAME_DUR;document.getElementById('hudTimer').classList.remove('urgent');document.getElementById('hudStage').textContent='🌟 童年';
  for(var p=0;p<3;p++){var el=document.getElementById('prog'+p);el.classList.remove('active','done');if(p===0)el.classList.add('active')}
  initBgClouds();var eh=gameScreen.querySelector('.hint-text');if(eh)eh.remove();resizeGC();
  startCountdown();
}

function endGame(){
  gameRunning=false;if(gameLoopId)cancelAnimationFrame(gameLoopId);gameLoopId=null;lastTime=0;stopBGM();sfxEnd();showScr(resultScreen);
  var title='🌟 超棒的！',pname='「酸甜达人」',pdesc='生活的酸甜你都懂，\n像AD钙奶一样充满能量！';
  if(score>=250){title='🏆 太厉害了！';pname='「AD 收藏家」';pdesc='每一份酸甜都被你珍藏，\n你是AD钙奶最忠实的伙伴！'}
  else if(score>=170){title='🌟 超棒的！';pname='「酸甜达人」';pdesc='生活的酸甜你都懂，\n像AD钙奶一样充满能量！'}
  else if(score>=100){title='💚 不错哦！';pname='「快乐伙伴」';pdesc='快乐是你最大的收获，\nAD钙奶陪你继续前行~'}
  else if(countStraw+countPeach+countClassic>countOther){title='🌸 甜甜的你！';pname='「甜甜小可爱」';pdesc='你总是能找到生活中的甜，\n世界因你而更美好！'}
  else{title='🦁 继续加油！';pname='「勇敢小狮子」';pdesc='不怕酸的你超勇敢，\n每一次成长都值得喝彩！'}
  document.getElementById('resultTitle').textContent=title;document.getElementById('personaName').textContent=pname;document.getElementById('personaDesc').textContent=pdesc;
  document.getElementById('scStraw').textContent=countStraw;document.getElementById('scPeach').textContent=countPeach;document.getElementById('scClassic').textContent=countClassic;document.getElementById('scOther').textContent=countOther;document.getElementById('statTotal').textContent=score;
}

function replayGame(){showScr(gameScreen);resizeGC();setTimeout(function(){clickStart()},100)}
function shareResult(){
  var pn=document.getElementById('personaName').textContent;
  var txt='我在AD钙奶·酸甜成长记中获得了'+score+'分！\n我的AD人格：'+pn+'\n陪你酸酸甜甜，懂你可可爱爱 💚';
  if(navigator.share){navigator.share({title:'AD钙奶·酸甜成长记',text:txt}).catch(function(){})}else{navigator.clipboard.writeText(txt).then(function(){showToast('已复制')}).catch(function(){showToast('可截图分享')})}
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2000)}

// ============ EVENTS ============
gameCanvas.addEventListener('touchstart',function(e){e.preventDefault();var p=getEP(e);targetX=Math.max(22,Math.min(gW-22,getCP(p.x,p.y).x))},{passive:false});
gameCanvas.addEventListener('touchmove',function(e){e.preventDefault();var p=getEP(e);targetX=Math.max(22,Math.min(gW-22,getCP(p.x,p.y).x))},{passive:false});
gameCanvas.addEventListener('touchend',function(e){e.preventDefault()},{passive:false});
gameCanvas.addEventListener('mousedown',function(e){targetX=getCP(e.clientX,e.clientY).x});
gameCanvas.addEventListener('mousemove',function(e){if(e.buttons)targetX=Math.max(22,Math.min(gW-22,getCP(e.clientX,e.clientY).x))});
gameScreen.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});

// ============ INIT ============
loadAll();showScr(startScreen);resizeGC();
</script>
</body>
